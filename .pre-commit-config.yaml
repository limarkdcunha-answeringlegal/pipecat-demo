repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version (use the latest stable version)
    rev: v0.15.19
    hooks:
      # 1. Run the linter and auto-fix fixable issues
      - id: ruff-check
        args: [ --fix ]
      # 2. Run the code formatter
      - id: ruff-format