<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Bot Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 8px; }
    p  { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin: 4px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start { background: #4f46e5; color: white; }
    .btn-stop  { background: #ef4444; color: white; }
    #status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #555;
      background: #f8f9fa;
      min-height: 40px;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: #ccc;
    }
    .dot.green { background: #22c55e; }
    .dot.red   { background: #ef4444; }
    audio { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Voice Bot Demo</h1>
    <p>The bot will ask for your name and email. Allow microphone access when prompted.</p>

    <button id="startBtn" class="btn btn-start" onclick="startCall()">Start Call</button>
    <button id="stopBtn"  class="btn btn-stop"  onclick="stopCall()" disabled>End Call</button>

    <div id="status"><span class="dot" id="dot"></span><span id="statusText">Ready</span></div>
    <audio id="botAudio" autoplay></audio>
  </div>

  <script>
    let pc = null;
    let pcId = null;
    let localStream = null;

    function setStatus(msg, color = '') {
      document.getElementById('statusText').textContent = msg;
      const dot = document.getElementById('dot');
      dot.className = 'dot' + (color ? ' ' + color : '');
    }

    async function startCall() {
      document.getElementById('startBtn').disabled = true;
      setStatus('Requesting microphone…');

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        setStatus('Microphone access denied: ' + e.message, 'red');
        document.getElementById('startBtn').disabled = false;
        return;
      }

      setStatus('Connecting…');

      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      // Send bot audio to <audio> element
      pc.ontrack = (event) => {
        document.getElementById('botAudio').srcObject = event.streams[0];
      };

      // Trickle ICE — batch candidates and send after gathering completes
      const iceCandidates = [];
      pc.onicecandidate = (e) => {
        if (e.candidate) iceCandidates.push(e.candidate);
      };

      pc.oniceconnectionstatechange = () => {
        const state = pc.iceConnectionState;
        if (state === 'connected' || state === 'completed') {
          setStatus('Connected — speak to the bot', 'green');
          document.getElementById('stopBtn').disabled = false;
        } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
          setStatus('Disconnected', 'red');
          resetUI();
        }
      };

      // Add microphone track
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      // Create offer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to complete
      await new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') resolve();
        };
        setTimeout(resolve, 3000); // fallback timeout
      });

      // Send offer to server
      const resp = await fetch('/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type,
        }),
      });

      if (!resp.ok) {
        setStatus('Server error: ' + resp.status, 'red');
        resetUI();
        return;
      }

      const answer = await resp.json();
      pcId = answer.pc_id;

      await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type });

      // Send gathered ICE candidates to server
      if (iceCandidates.length > 0) {
        await fetch('/ice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pc_id: pcId,
            candidates: iceCandidates.map(c => ({
              candidate: c.candidate,
              sdpMid: c.sdpMid,
              sdpMLineIndex: c.sdpMLineIndex,
            })),
          }),
        });
      }

      setStatus('Waiting for bot…', 'green');
    }

    async function stopCall() {
      if (pc) { pc.close(); pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      document.getElementById('botAudio').srcObject = null;
      setStatus('Call ended');
      resetUI();
    }

    function resetUI() {
      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
    }
  </script>
</body>
</html>
